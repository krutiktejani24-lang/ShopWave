<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopWave Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0F0F13;
}

.login-container{
  width:400px;
  background:#1A1A22;
  border:1px solid #2A2A35;
  border-radius:20px;
  padding:35px;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.logo{
  width:70px;
  height:70px;
  margin:auto;
  background:#00D68F;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:35px;
}

h1{
  margin-top:15px;
  color:white;
  font-family:'Syne',sans-serif;
}

h1 span{
  color:#00D68F;
}

.subtitle{
  color:#9898A8;
  margin-top:8px;
  margin-bottom:25px;
  font-size:14px;
}

.input-box{
  margin-bottom:15px;
}

.input-box input{
  width:100%;
  height:48px;
  background:#26262F;
  border:1px solid #35353F;
  border-radius:10px;
  padding:0 15px;
  color:white;
  font-size:14px;
}

.input-box input:focus{
  outline:none;
  border-color:#00D68F;
}

.login-btn{
  width:100%;
  height:48px;
  border:none;
  border-radius:10px;
  background:#00D68F;
  color:#000;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}

.login-btn:hover{
  background:#00FF9F;
}

.demo{
  margin-top:15px;
  color:#60606E;
  font-size:12px;
}
</style>
</head>

<body>

<div class="login-container">

  <div class="logo">🛍️</div>

  <h1>Shop<span>Wave</span></h1>

  <p class="subtitle">
    Login to continue shopping
  </p>

  <div class="input-box">
    <input type="email" id="email" placeholder="Enter Email">
  </div>

  <div class="input-box">
    <input type="password" id="password" placeholder="Enter Password">
  </div>

  <button class="login-btn" onclick="loginUser()">
    Login
  </button>

  <div class="demo">
    Demo Login<br>
    admin@shopwave.com<br>
    Password: 123456
  </div>

</div>

<script>
async function loginUser(){

    const email =
        document.getElementById("email").value;

    const password =
        document.getElementById("password").value;

    try{

         fetch(
            "https://shopwave-s8ro.onrender.com/users/login",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    email:email,
                    password:password
                })
            }
        );

        if(response.ok){

            const token = await response.text();

            localStorage.setItem(
                "token",
                token
            );

            alert("Login Successful");

            window.location.href =
                "ShopWave.html";

        }else{

            alert("Invalid Credentials");
        }

    }catch(error){

        console.error(error);
        alert("Server Error");
    }
}
</script>

</body>
</html>
